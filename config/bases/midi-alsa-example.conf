# Copy to ~/.config/autodos/bases/midi-alsa-local.conf and edit.
# MIDI routing is highly OS- and build-specific (ALSA, FluidSynth, mt32emu, etc.).
#
# DOSBox Staging examples (uncomment / adapt):
#
# [midi]
# mididevice=fluidsynth
# fluid.soundfont=/usr/share/soundfonts/FluidR3_GM.sf2
#
# Or route to an external synth / Timidity ALSA port:
# mididevice=alsa
# midiconfig=128:0
#
# Include graphics from default or window-* profile by running sync tools,
# or duplicate [sdl] blocks here.

[sdl]
fullscreen=false
windowresolution=1280x960
output=opengl
aspect=true

[dosbox]
machine=svga_s3

[mixer]
rate=44100

[render]
frameskip=0
aspect=true
