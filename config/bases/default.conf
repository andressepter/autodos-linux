# AutoDOS base profile — machine-wide video/audio defaults.
# Do not put [autoexec] here; the tool appends mount/launch per game.
# Keep roughly aligned with built-in fallback in autodos.cpp (builtInBaseConf).

[sdl]
fullscreen=true
fullresolution=desktop
output=openglnb

[dosbox]
machine=svga_s3

[mixer]
rate=44100
blocksize=1024
prebuffer=20

[render]
frameskip=0
aspect=true
