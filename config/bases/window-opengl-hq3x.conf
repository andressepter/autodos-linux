# Example: windowed OpenGL + hq3x scaler (tune for your GPU / taste).
# Select: AUTODOS_BASE_PROFILE=window-opengl-hq3x  or  --profile window-opengl-hq3x

[sdl]
fullscreen=false
fulldouble=false
fullresolution=desktop
windowresolution=1280x960
output=opengl
aspect=true

[dosbox]
machine=svga_s3
captures=capture
memsize=16

[render]
frameskip=0
aspect=true
scaler=hq3x

[mixer]
rate=44100
blocksize=1024
prebuffer=20
